spring.application.name=giaodien_doan

# ===================================================
# RiceGuard AI - Spring Boot Configuration
# ===================================================

# --- Server ---
server.port=8080

# --- MySQL Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/rice_disease_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sa123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- AI Python Inference Server ---
ai.server.url=http://localhost:8000

# --- Logging ---
logging.level.com.example.giaodien_doan=DEBUG
logging.level.org.springframework.web=INFO

# --- CORS (cho dev; cấu hình lại khi production) ---
# Được xử lý trong WebConfig.java
